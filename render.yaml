# Deploy the NestJS API on Render (free tier). Pair with Neon/Supabase for PostgreSQL.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sportskeeda-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /api/categories
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false
